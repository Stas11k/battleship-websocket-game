<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Морський бій — WebDataRocks</title>

    <link href="https://cdn.webdatarocks.com/latest/webdatarocks.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />

    <script src="https://cdn.webdatarocks.com/latest/webdatarocks.js"></script>
    <script src="boardData.js"></script>
    <script src="webdatarocksBoard.js"></script>
    <script src="websocket.js"></script>
    <script src="app.js"></script>
</head>

<body>

    <header class="game-header">
        <h1>Морський бій</h1>

        <div class="scoreboard">
            <span id="playerLabel">Гравець: -</span>
            <span id="turnLabel">Очікування...</span>
            <span id="statusLabel">Підключення...</span>
        </div>

        <div class="control-panels">
            <section id="placementPanel" class="control-card placement-panel placement-panel-disabled"
                aria-label="Розміщення кораблів">
                <h2 class="control-card-title">Розміщення кораблів</h2>

                <div class="placement-actions">
                    <button type="button" data-ship-size="4">4-палубний ×1</button>
                    <button type="button" data-ship-size="3">3-палубний ×2</button>
                    <button type="button" data-ship-size="2">2-палубний ×3</button>
                    <button type="button" data-ship-size="1">1-палубний ×4</button>
                    <button type="button" id="directionButton">Напрямок: горизонтально</button>
                </div>
            </section>

            <section id="battleActions" class="control-card battle-actions battle-actions-disabled"
                aria-label="Вибір знаряддя">
                <h2 class="control-card-title">Вибір знаряддя</h2>

                <div class="battle-action-buttons">
                    <button type="button" id="shotButton" class="active-action-button">Постріл</button>
                    <button type="button" id="scannerButton">Сканер 3×3 ×1</button>
                    <button type="button" id="torpedoButton">Торпедоносець ×2</button>
                </div>
            </section>
        </div>
    </header>

    <main class="game-layout">
        <section class="board-section">
            <h2>Моє поле</h2>
            <div id="myBoard"></div>
        </section>

        <section id="turnIndicator" class="turn-indicator turn-indicator-waiting" aria-label="Індикатор атаки">
            <div id="attackArrow" class="attack-arrow attack-arrow-waiting"></div>
            <div id="turnTimer" class="turn-timer">25</div>
        </section>

        <section class="board-section">
            <h2>Поле суперника</h2>
            <div id="enemyBoard"></div>
        </section>
    </main>

</body>

</html>
